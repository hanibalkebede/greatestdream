<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Snake Highway</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="overlay">
        <h1>Choose your snake</h1>
        <div id="choices">
            <div class="choice" data-type="normal">Normal Snake</div>
            <div class="choice" data-type="cobra">Cobra</div>
            <div class="choice" data-type="winged">Winged Snake</div>
        </div>
        <p>Click a snake to select and start. Press Space to start/pause during play.</p>
    </div>

    <canvas id="game"></canvas>

    <div id="hud">

        <div id="speed">Speed: 0</div>
        <div id="score">Score: 0</div>
    </div>

    <script src="main.js"></script>
</body>

</html>
